name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.1"

jobs:
  quality:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Just
        uses: extractions/setup-just@v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run checks (lint + format + typecheck)
        run: just check

      - name: Run tests (unit + integration)
        run: just test

      - name: Build binary
        run: just build

      - name: Run E2E tests (Linux only — bash scripts)
        if: runner.os == 'Linux'
        run: just test-e2e
        timeout-minutes: 5

      - name: Smoke test binary (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ./dist/codice-macos --version
            ./dist/codice-macos --help
          else
            ./dist/codice-windows.exe --version
            ./dist/codice-windows.exe --help
          fi

      - name: Set artifact binary name
        id: artifact
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "name=codice-linux" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "name=codice-macos" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "name=codice-windows" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload binary artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist/
          retention-days: 7
